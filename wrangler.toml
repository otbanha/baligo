compatibility_date = "2024-01-01"

[ai]
binding = "AI"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "baligo-image"

[[d1_databases]]
binding = "DB"
database_name = "bali-chat-logs"
database_id = "680c2cb9-e863-4f43-85e9-7435df71fcdf"

# URL Unfurl Tool — KV namespaces
# Create these in Cloudflare Dashboard → KV → Create namespace, then fill in the IDs below.
# Also add ADMIN_SECRET as an encrypted Environment Variable in Cloudflare Pages settings.
[[kv_namespaces]]
binding = "UNFURL_CACHE"
id = "REPLACE_WITH_UNFURL_CACHE_NAMESPACE_ID"

[[kv_namespaces]]
binding = "UNFURL_RATELIMIT"
id = "REPLACE_WITH_UNFURL_RATELIMIT_NAMESPACE_ID"

[[kv_namespaces]]
binding = "UNFURL_RECENT"
id = "REPLACE_WITH_UNFURL_RECENT_NAMESPACE_ID"

[[kv_namespaces]]
binding = "UNFURL_BLOCKLIST"
id = "REPLACE_WITH_UNFURL_BLOCKLIST_NAMESPACE_ID"
