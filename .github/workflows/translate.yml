name: 自動翻譯文章

on:
  push:
    branches: [main]
    paths:
      - 'src/content/blog/**'

  # 允許手動觸發（不限時間）
  workflow_dispatch:
    inputs:
      lang:
        description: '指定語言（留空翻譯全部）'
        required: false
        default: ''
      file:
        description: '指定檔案（留空翻譯全部）'
        required: false
        default: ''

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 確認執行時間（push 觸發限 UTC 18:00-22:00）
        if: github.event_name == 'push'
        run: |
          HOUR=$(date -u +%H)
          echo "目前 UTC 時間：$(date -u)"
          if [ "$HOUR" -lt 18 ] || [ "$HOUR" -ge 22 ]; then
            echo "⏭️ 目前在台灣白天，跳過翻譯（UTC $HOUR 時，僅 18-22 時執行）"
            echo "SKIP=true" >> $GITHUB_ENV
          else
            echo "SKIP=false" >> $GITHUB_ENV
          fi

      - name: Checkout
        if: env.SKIP != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 設定 Node.js
        if: env.SKIP != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 安裝依賴
        if: env.SKIP != 'true'
        run: npm ci

      - name: 還原翻譯快取
        if: env.SKIP != 'true'
        uses: actions/cache@v4
        with:
          path: .translation-cache.json
          key: translation-cache-persistent
          save-always: true

      - name: 執行翻譯
        if: env.SKIP != 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          LANG_ARG=""
          FILE_ARG=""
          if [ -n "${{ github.event.inputs.lang }}" ]; then
            LANG_ARG="--lang ${{ github.event.inputs.lang }}"
          fi
          if [ -n "${{ github.event.inputs.file }}" ]; then
            FILE_ARG="--file ${{ github.event.inputs.file }}"
          fi
          node scripts/translate.mjs $LANG_ARG $FILE_ARG

      - name: Commit 翻譯結果
        if: env.SKIP != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/zh-cn/ src/content/zh-hk/ src/content/en/ || true
          if git diff --cached --quiet; then
            echo "沒有新翻譯，跳過 commit"
          else
            COUNT=$(git diff --cached --name-only | wc -l)
            git commit -m "chore: 自動翻譯 ${COUNT} 篇文章 [skip ci]"
            git push
          fi
