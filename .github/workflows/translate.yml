name: 自動翻譯文章

on:
  push:
    branches: [main]
    paths:
      - 'src/content/blog/**'
      - 'src/content/blocks/**'

  # 每天 Jakarta 時間凌晨 2:00（UTC 19:00）自動同步
  schedule:
    - cron: '0 19 * * *'

  # 允許手動觸發
  workflow_dispatch:
    inputs:
      only_blocks:
        description: '只翻譯內容區塊（true = 跳過文章翻譯，省費用）'
        required: false
        default: 'false'

jobs:
  translate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: 確認是否跳過（push 觸發限 UTC 19:00-23:00；schedule/手動不限）
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            if echo "$COMMIT_MSG" | grep -qE '\[(skip ci|skip translate)\]'; then
              echo "⏭️ Commit 含 [skip ci] 或 [skip translate]，跳過翻譯"
              echo "SKIP=true" >> $GITHUB_ENV
              exit 0
            fi
            HOUR=$(date -u +%H)
            echo "目前 UTC 時間：$(date -u)"
            if [ "$HOUR" -lt 19 ] || [ "$HOUR" -ge 23 ]; then
              echo "⏭️ 目前在白天，跳過翻譯（UTC $HOUR 時，僅 19-23 時執行）"
              echo "SKIP=true" >> $GITHUB_ENV
            else
              echo "SKIP=false" >> $GITHUB_ENV
            fi
          else
            echo "SKIP=false" >> $GITHUB_ENV
          fi

      - name: Checkout
        if: env.SKIP != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 設定 Node.js
        if: env.SKIP != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 安裝 Node 依賴
        if: env.SKIP != 'true'
        run: npm ci

      - name: 還原翻譯快取
        if: env.SKIP != 'true'
        uses: actions/cache@v4
        with:
          path: .translation-cache.json
          key: translation-cache-persistent
          save-always: true

      - name: 同步圖片路徑（不需 API key）
        if: env.SKIP != 'true'
        run: python3 sync_translations.py --auto

      - name: 執行翻譯
        if: env.SKIP != 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TRANSLATE_BATCH_SIZE: '1'
        run: |
          if [ "${{ github.event.inputs.only_blocks }}" = "true" ]; then
            echo "📦 只翻譯內容區塊"
            node scripts/translate.mjs --blocks
          else
            echo "📝 翻譯文章 + 內容區塊"
            node scripts/translate.mjs
            node scripts/translate.mjs --blocks
          fi

      - name: Commit 翻譯結果
        if: env.SKIP != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/zh-cn/ src/content/zh-hk/ src/content/en/ src/content/blocks/zh-cn/ src/content/blocks/en/ || true
          if git diff --cached --quiet; then
            echo "沒有新翻譯，跳過 commit"
          else
            COUNT=$(git diff --cached --name-only | wc -l)
            git commit -m "chore: 自動翻譯 ${COUNT} 篇文章"
            git push
          fi
