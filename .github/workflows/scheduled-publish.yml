name: 定時重建發佈

on:
  # 峇里時間（WITA = UTC+8）
  # UTC 22 = Bali 06:00, UTC 23 = Bali 07:00
  schedule:
    - cron: '0 22 * * *'   # Bali 06:00
    - cron: '0 23 * * *'   # Bali 07:00

  # 允許手動觸發（測試用）
  workflow_dispatch:

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: 觸發 Cloudflare Pages 重建
        run: |
          echo "觸發時間（UTC）：$(date -u)"
          echo "峇里時間（WITA UTC+8）：$(TZ='Asia/Makassar' date)"
          curl -s -o /dev/null -w "HTTP status: %{http_code}" \
            -X POST "${{ secrets.CF_PAGES_DEPLOY_HOOK }}"
