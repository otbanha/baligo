name: 更新換匯所 KML（每半年）

on:
  schedule:
    # 每年 1/1 與 7/1 凌晨 02:00 UTC（峇里島時間 10:00 WITA）
    - cron: '0 2 1 1 *'   # 每年 1 月 1 日
    - cron: '0 2 1 7 *'   # 每年 7 月 1 日
  workflow_dispatch:       # 允許手動觸發

permissions:
  contents: write          # 允許 commit & push KML

jobs:
  update-kml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 執行爬蟲更新 KML
        run: node scripts/scrape-bi-money-changers.mjs

      - name: 確認 KML 有變動
        id: diff
        run: |
          git diff --quiet public/maps/money-changer.kml && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit & Push 更新
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/maps/money-changer.kml scripts/money-changer-data.json
          git commit -m "chore: update BI money changer KML ($(date -u +%Y-%m-%d))"
          git push

      - name: 無變動時略過
        if: steps.diff.outputs.changed == 'false'
        run: echo "KML 與現有版本相同，略過 commit。"
