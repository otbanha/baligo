<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>巴厘岛交通方式选择测验</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif; background: #fff; color: #1a1a1a; }
.quiz-wrap { padding: 1.5rem 1rem; max-width: 600px; margin: 0 auto; }
.progress-bar { height: 3px; background: #e5e5e5; border-radius: 2px; margin-bottom: 1.75rem; }
.progress-fill { height: 100%; border-radius: 2px; background: #1D9E75; transition: width 0.4s ease; }
.step { display: none; animation: fadeIn 0.25s ease; }
.step.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.q-label { font-size: 11px; color: #888; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.4rem; }
.q-text { font-size: 18px; font-weight: 500; line-height: 1.4; margin-bottom: 0.4rem; }
.q-hint { font-size: 12px; color: #888; margin-bottom: 1rem; }
.options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.options.single-col { grid-template-columns: 1fr; }
.opt-btn {
  background: #fff;
  border: 1.5px solid #ddd;
  border-radius: 12px;
  padding: 12px 14px;
  text-align: left;
  cursor: pointer;
  font-size: 13px;
  color: #1a1a1a;
  transition: all 0.15s;
  line-height: 1.4;
  font-weight: 400;
  font-family: inherit;
}
.opt-btn:hover { border-color: #0F6E56; background: #E1F5EE; }
.opt-btn[data-selected="green"] { border-color: #0F6E56 !important; background: #9FE1CB !important; color: #04342C !important; font-weight: 500 !important; }
.opt-btn[data-selected="blue"]  { border-color: #185FA5 !important; background: #B5D4F4 !important; color: #042C53 !important; font-weight: 500 !important; }
.opt-btn[data-selected="amber"] { border-color: #854F0B !important; background: #FAC775 !important; color: #412402 !important; font-weight: 500 !important; }
.nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1.25rem; }
.btn-back { background: transparent; border: 0.5px solid #ddd; border-radius: 8px; padding: 8px 16px; cursor: pointer; font-size: 13px; color: #888; font-family: inherit; }
.btn-back:hover { background: #f5f5f5; }
.btn-next { background: #1D9E75; border: none; border-radius: 8px; padding: 8px 20px; cursor: pointer; font-size: 13px; color: #fff; font-weight: 500; opacity: 0.35; pointer-events: none; transition: opacity 0.2s; font-family: inherit; }
.btn-next.ready { opacity: 1; pointer-events: auto; }
.result-card { background: #fff; border: 0.5px solid #ddd; border-radius: 12px; padding: 1.25rem; margin-bottom: 0.75rem; }
.result-hero { display: flex; align-items: center; gap: 14px; margin-bottom: 0.75rem; }
.result-icon { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.ri-charter { background: #E1F5EE; }
.ri-app { background: #E6F1FB; }
.ri-moto { background: #FAEEDA; }
.result-title { font-size: 20px; font-weight: 500; }
.result-sub { font-size: 13px; color: #888; }
.result-desc { font-size: 14px; line-height: 1.7; margin-bottom: 0.75rem; }
.reason-section-label { font-size: 11px; color: #888; margin-bottom: 5px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
.reason-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 0.75rem; }
.reason-item { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; line-height: 1.5; }
.rdot { width: 5px; height: 5px; border-radius: 50%; background: #1D9E75; margin-top: 7px; flex-shrink: 0; }
.tip-box { background: #f5f5f5; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #555; line-height: 1.6; margin-bottom: 0.75rem; }
.tip-box strong { color: #1a1a1a; font-weight: 500; }
.score-section-label { font-size: 11px; color: #888; margin-bottom: 6px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
.score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; font-size: 12px; }
.score-label { width: 72px; color: #888; }
.score-track { flex: 1; height: 6px; background: #e5e5e5; border-radius: 3px; overflow: hidden; }
.score-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease 0.15s; }
.fc { background: #1D9E75; }
.fa { background: #378ADD; }
.fm { background: #EF9F27; }
.score-num { width: 28px; text-align: right; font-weight: 500; font-size: 12px; }
.link-btn { display: block; width: 100%; border: 0.5px solid #ddd; border-radius: 8px; padding: 10px 16px; text-align: center; cursor: pointer; font-size: 13px; color: #555; background: transparent; margin-bottom: 0.5rem; font-family: inherit; text-decoration: none; }
.link-btn:hover { background: #f5f5f5; }
.restart-btn { display: block; width: 100%; border: none; background: transparent; padding: 8px; text-align: center; cursor: pointer; font-size: 12px; color: #aaa; font-family: inherit; }
.restart-btn:hover { color: #555; }
.multi-counter { font-size: 11px; color: #888; margin-top: 8px; text-align: right; }
@media (max-width: 400px) {
  .options { grid-template-columns: 1fr; }
  .q-text { font-size: 16px; }
}
</style>
</head>
<body>

<div class="quiz-wrap">
  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
  <div id="quiz-area"></div>
</div>

<script>
/*
 * 计分逻辑 v2 — 整合 17 条判断规则
 */

const STEPS = [
  {
    id: 'group_size',
    text: '这趟巴厘岛是几个人？',
    cols: 1,
    options: [
      { label: '一个人', color: 'amber', score: { charter: 0, app: 1, moto: 2 } },
      { label: '两个人 / 情侣', color: 'blue',  score: { charter: 2, app: 2, moto: -1 } },
      { label: '三人以上 / 家庭出游（含带小孩）', color: 'green', score: { charter: 4, app: 0, moto: -4 } },
    ]
  },
  {
    id: 'itinerary',
    text: '今天的行程性质？',
    cols: 1,
    options: [
      { label: '跨区长途移动（库塔→乌布、海神庙等）', color: 'green', score: { charter: 4, app: -2, moto: -3 } },
      { label: '一天跑两三个以上景点', color: 'green', score: { charter: 3, app: -1, moto: -2 } },
      { label: '热门打卡景点（需长时间排队）', color: 'green', score: { charter: 2.5, app: -0.5, moto: -1 } },
      { label: '闹区短途、单点来回', color: 'blue', score: { charter: -1, app: 2, moto: 2 } },
      { label: '还没决定，随兴走', color: 'amber', score: { charter: 1, app: 1, moto: 0 } },
    ]
  },
  {
    id: 'situation',
    text: '还有哪些状况？',
    hint: '可多选最多 4 项，没有也可以略过',
    multi: true,
    maxSelect: 4,
    optional: true,
    cols: 2,
    options: [
      { label: '刚抵达，需换汇办SIM卡上超市', color: 'green', score: { charter: 2, app: 0, moto: -1 } },
      { label: '行李多 / 换住宿 / 赶飞机', color: 'green', score: { charter: 2, app: -0.5, moto: -3 } },
      { label: '雨季 / 天气不稳定', color: 'amber', score: { charter: 1.5, app: 0, moto: -2.5 } },
      { label: '住郊区或偏远地区', color: 'green', score: { charter: 2, app: -1, moto: -1.5 } },
      { label: '需要有人拍照 / 讲解', color: 'green', score: { charter: 1.5, app: 0, moto: -2 } },
      { label: '带小孩，希望多人照顾', color: 'green', score: { charter: 1.5, app: 0, moto: -3 },
        showIf: function(a) { return a.group_size !== 2; } },
      { label: '女生独旅，安全第一', color: 'green', score: { charter: 2, app: 0, moto: -1.5 },
        showIf: function(a) { return a.group_size === 0; } },
      { label: '预算很紧', color: 'amber', score: { charter: -1, app: 0.5, moto: 1.5 } },
      { label: '想体验在地骑车感', color: 'amber', score: { charter: -1, app: 0, moto: 2 },
        showIf: function(a) { return a.group_size !== 2; } },
    ]
  },
];

var current = 0;
var answers = {};
var visibleSteps = [];

function buildVisibleSteps() {
  visibleSteps = STEPS.filter(function(s){ return !s.showIf || s.showIf(answers); });
}

function getVisibleOptions(q) {
  return q.options.map(function(o, i){ return { o: o, i: i }; })
    .filter(function(x){ return !x.o.showIf || x.o.showIf(answers); });
}

function render() {
  buildVisibleSteps();
  var area = document.getElementById('quiz-area');
  if (current >= visibleSteps.length) { showResult(); return; }
  var q = visibleSteps[current];
  var total = visibleSteps.length;
  document.getElementById('prog').style.width = Math.round(((current + 1) / (total + 1)) * 100) + '%';

  var optClass = 'options' + (q.cols === 1 ? ' single-col' : '');
  var prev = answers[q.id];
  var visOpts = getVisibleOptions(q);

  var opts = visOpts.map(function(x) {
    var o = x.o;
    var origIdx = x.i;
    var isSelected = Array.isArray(prev) ? prev.indexOf(origIdx) !== -1 : prev === origIdx;
    var selAttr = isSelected ? 'data-selected="' + o.color + '"' : '';
    return '<button class="opt-btn" data-idx="' + origIdx + '" data-color="' + o.color + '" ' + selAttr + ' onclick="selectOpt(this,' + origIdx + ')">' + o.label + '</button>';
  }).join('');

  var hasAnswer = prev !== undefined && (!Array.isArray(prev) || prev.length > 0);
  var canProceed = hasAnswer || q.optional;
  var isLast = current === total - 1;

  var counterHtml = '';
  if (q.multi && q.maxSelect) {
    var selCount = Array.isArray(prev) ? prev.length : 0;
    counterHtml = '<div class="multi-counter">已选 ' + selCount + ' / ' + q.maxSelect + (q.optional ? '（可略过）' : '') + '</div>';
  }

  area.innerHTML = '<div class="step active">'
    + '<div class="q-label">步骤 ' + (current + 1) + ' / ' + total + '</div>'
    + '<div class="q-text">' + q.text + '</div>'
    + (q.hint ? '<div class="q-hint">' + q.hint + '</div>' : '')
    + '<div class="' + optClass + '">' + opts + '</div>'
    + counterHtml
    + '<div class="nav-row">'
    + (current > 0 ? '<button class="btn-back" onclick="goBack()">← 上一步</button>' : '<span></span>')
    + '<button class="btn-next ' + (canProceed ? 'ready' : '') + '" id="btn-next" onclick="goNext()">' + (isLast ? '查看结果 →' : '下一步 →') + '</button>'
    + '</div></div>';
}

function selectOpt(btn, idx) {
  var q = visibleSteps[current];
  var color = btn.getAttribute('data-color');
  if (q.multi) {
    var isSelected = btn.hasAttribute('data-selected');
    if (isSelected) {
      btn.removeAttribute('data-selected');
    } else {
      var currentSel = Array.from(document.querySelectorAll('.opt-btn[data-selected]'));
      if (q.maxSelect && currentSel.length >= q.maxSelect) {
        btn.style.transform = 'translateX(2px)';
        setTimeout(function(){ btn.style.transform = ''; }, 100);
        return;
      }
      btn.setAttribute('data-selected', color);
    }
    var sel = Array.from(document.querySelectorAll('.opt-btn[data-selected]')).map(function(b){ return +b.getAttribute('data-idx'); });
    answers[q.id] = sel;
    if (q.maxSelect) {
      var counter = document.querySelector('.multi-counter');
      if (counter) counter.innerHTML = '已选 ' + sel.length + ' / ' + q.maxSelect + (q.optional ? '（可略过）' : '');
    }
    document.getElementById('btn-next').classList.add('ready');
  } else {
    document.querySelectorAll('.opt-btn').forEach(function(b){ b.removeAttribute('data-selected'); });
    btn.setAttribute('data-selected', color);
    answers[q.id] = idx;
    document.getElementById('btn-next').classList.add('ready');
  }
}

function goNext() {
  var q = visibleSteps[current];
  var ans = answers[q.id];
  if (!q.optional) {
    if (ans === undefined || (Array.isArray(ans) && ans.length === 0)) return;
  }
  if (q.id === 'group_size') {
    delete answers.situation;
  }
  current++;
  render();
}

function goBack() { current--; render(); }

function calcScores() {
  var s = { charter: 0, app: 0, moto: 0 };
  visibleSteps.forEach(function(q) {
    var ans = answers[q.id];
    if (ans === undefined) return;
    (Array.isArray(ans) ? ans : [ans]).forEach(function(i) {
      var sc = q.options[i] && q.options[i].score;
      if (!sc) return;
      s.charter += sc.charter || 0;
      s.app     += sc.app     || 0;
      s.moto    += sc.moto    || 0;
    });
  });
  return s;
}

var results = {
  charter: {
    icon: '🚗', cls: 'ri-charter', title: '包车', sub: '最安心、最划算的选择',
    desc: '根据你的情况，包车是最合适的选择。一天下来通常比多次叫车更省，司机全程陪同，不用排队等车、不必担心找不到回程，还能顺便了解当地文化、听司机讲解，享受贵宾级的体验。',
    tip: '<strong>建议：</strong>提前与司机沟通行程，通常不需要另付餐费，可邀请司机一起吃当地小吃，体验更地道。',
    link: 'https://gobaligo.id/zh-cn/blog/2024-01-12-65a0a163fd8978000115f37a/',
  },
  app: {
    icon: '📱', cls: 'ri-app', title: 'App 叫车（四轮）', sub: 'Grab / Gojek 轿车',
    desc: '行程简单、闹区移动，App 叫车最灵活，费用透明，随叫随到，不用提前预约。',
    tip: '<strong>建议：</strong>目的地用英文输入较准，热门景点可能需要走到路边才叫得到车。',
    link: 'https://gobaligo.id/zh-cn/blog/2024-10-13-670b5191fd8978000185cf37/',
  },
  moto: {
    icon: '🛵', cls: 'ri-moto', title: 'App 叫摩托车', sub: 'Grab / Gojek 两轮',
    desc: '轻装独行、闹区短途，叫摩托车最快最省。车费通常只有四轮的一半，穿行小巷不堵车。',
    tip: '<strong>建议：</strong>上车前确认司机评分与车牌。下雨天或距离较远时建议改叫四轮。',
    link: 'https://gobaligo.id/zh-cn/blog/2024-05-03-6634d110fd897800012a9d6b/',
  }
};

function getReasons(winner) {
  var sit = answers.situation || [];
  var size = answers.group_size; // 0 solo / 1 pair / 2 group
  var iti = answers.itinerary;   // 0 cross / 1 multi / 2 hotspot / 3 local / 4 free
  var r = [];

  if (winner === 'charter') {
    if (size === 2) r.push('多人同行分摊费用，比想象中划算');
    if (size === 1) r.push('两人同行，包车舒适度比叫车高');
    if (size === 0) r.push('一人独旅，全程有司机陪同更安心');
    if (iti === 0) r.push('跨区长途，固定费用不跳表');
    if (iti === 1) r.push('一天跑多景点，包车不用重复叫车等待');
    if (iti === 2) r.push('热门景点要排队，包车不怕找不到回程');
    if (sit.indexOf(0) !== -1) r.push('刚抵达，换汇办SIM上超市一次搞定');
    if (sit.indexOf(1) !== -1) r.push('行李多／换住宿，包车空间充裕');
    if (sit.indexOf(2) !== -1) r.push('雨季天气不稳，包车有空调可避雨');
    if (sit.indexOf(3) !== -1) r.push('住郊区，App车辆少，包车更可靠');
    if (sit.indexOf(4) !== -1) r.push('需要拍照讲解，司机乐意协助');
    if (sit.indexOf(5) !== -1) r.push('带小孩多一个人照顾，安心很多');
    if (sit.indexOf(6) !== -1) r.push('女生独旅，包车比叫车更安全');
  } else if (winner === 'app') {
    if (iti === 3) r.push('闹区短途，叫车比包车划算灵活');
    if (iti === 4) r.push('行程随兴，叫车最有弹性');
    if (size === 2 && iti === 3) r.push('家庭闹区单点，叫车比包车一日方案省');
    if (size === 1 && iti !== 3) r.push('两人出行，App 四轮刚刚好');
    if (size === 1 && iti === 3) r.push('两人闹区走走，叫车随叫随到最方便');
    if (size === 0) r.push('一人独旅，App 四轮比摩托车舒适');
    if (sit.indexOf(7) !== -1) r.push('预算考量，比包车省下整日费用');
    if (r.length === 0) r.push('行程简单，叫车最灵活');
  } else { // moto
    if (size === 0) r.push('一人轻装，摩托车最方便');
    if (iti === 3) r.push('闹区短途，摩托车不堵车最快');
    if (sit.indexOf(7) !== -1) r.push('预算很紧，摩托车费只有四轮一半');
    if (sit.indexOf(8) !== -1) r.push('体验在地骑车感，这就是巴厘岛日常');
    if (r.length === 0) r.push('轻装短途，摩托车最快最省');
  }
  return r.slice(0, 5);
}

function showResult() {
  document.getElementById('prog').style.width = '100%';
  var scores = calcScores();

  var winner;
  var maxScore = Math.max(scores.charter, scores.app, scores.moto);

  if (answers.itinerary === 3) {
    winner = scores.app >= scores.moto ? 'app' : 'moto';
  } else if (scores.charter === maxScore && scores.charter > 0) {
    winner = 'charter';
  } else if (scores.app === maxScore) {
    winner = 'app';
  } else if (scores.moto === maxScore) {
    winner = 'moto';
  } else {
    winner = 'charter';
  }

  var r = results[winner];
  var reasons = getReasons(winner);

  var minScore = Math.min(scores.charter, scores.app, scores.moto, 0);
  var shifted = {
    charter: scores.charter - minScore,
    app: scores.app - minScore,
    moto: scores.moto - minScore,
  };
  var maxShifted = Math.max(shifted.charter, shifted.app, shifted.moto, 1);
  var bars = {
    charter: Math.round(shifted.charter / maxShifted * 100),
    app:     Math.round(shifted.app     / maxShifted * 100),
    moto:    Math.round(shifted.moto    / maxShifted * 100),
  };

  var reasonHtml = reasons.map(function(rs){ return '<div class="reason-item"><div class="rdot"></div><span>' + rs + '</span></div>'; }).join('');

  document.getElementById('quiz-area').innerHTML = '<div class="step active">'
    + '<div class="result-card">'
    + '<div class="result-hero"><div class="result-icon ' + r.cls + '">' + r.icon + '</div>'
    + '<div><div class="result-title">推荐：' + r.title + '</div><div class="result-sub">' + r.sub + '</div></div></div>'
    + '<p class="result-desc">' + r.desc + '</p>'
    + (reasons.length ? '<div class="reason-section-label">推荐原因</div><div class="reason-list">' + reasonHtml + '</div>' : '')
    + '<div class="tip-box">' + r.tip + '</div>'
    + '<div class="score-section-label">各选项适合程度</div>'
    + '<div class="score-row"><span class="score-label">包车</span><div class="score-track"><div class="score-fill fc" id="b1" style="width:0%"></div></div><span class="score-num">' + bars.charter + '%</span></div>'
    + '<div class="score-row"><span class="score-label">App 四轮</span><div class="score-track"><div class="score-fill fa" id="b2" style="width:0%"></div></div><span class="score-num">' + bars.app + '%</span></div>'
    + '<div class="score-row"><span class="score-label">App 摩托车</span><div class="score-track"><div class="score-fill fm" id="b3" style="width:0%"></div></div><span class="score-num">' + bars.moto + '%</span></div>'
    + '</div>'
    + '<a class="link-btn" href="' + r.link + '" target="_blank" rel="noopener">阅读完整交通攻略 →</a>'
    + '<button class="restart-btn" onclick="restart()">重新测验</button>'
    + '</div>';

  setTimeout(function() {
    var b1 = document.getElementById('b1');
    var b2 = document.getElementById('b2');
    var b3 = document.getElementById('b3');
    if (b1) b1.style.width = bars.charter + '%';
    if (b2) b2.style.width = bars.app + '%';
    if (b3) b3.style.width = bars.moto + '%';
  }, 100);
}

function restart() { current = 0; answers = {}; render(); }

render();
</script>

</body>
</html>
