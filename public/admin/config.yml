backend:
  name: github
  repo: otbanha/baligo
  branch: main
  base_url: https://sveltia-cms-auth.pages.dev

media_folder: public/images
public_folder: /images

collections:
  - name: blog
    label: 文章
    folder: src/content/blog
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sort_field: pubDate
    sort_direction: Descending
    fields:
      - { label: 標題, name: title, widget: string }
      - { label: 描述, name: description, widget: text, required: false }
      - { label: 發佈日期, name: pubDate, widget: datetime }
      - label: 分類
        name: category
        widget: list
        field: { label: 分類, name: category, widget: string }
      - { label: 封面圖網址, name: heroImage, widget: string, required: false }
      - label: Tags
        name: tags
        widget: list
        field: { label: Tag, name: tag, widget: string }
        required: false
      - { label: 原始網址, name: originalUrl, widget: string, required: false }
      - { label: 內文, name: body, widget: markdown }

  - name: blocks
    label: 內容區塊
    folder: src/content/blocks
    create: true
    slug: "{{slug}}"
    fields:
      - { label: 區塊名稱, name: title, widget: string }
      - label: 區塊類型
        name: type
        widget: select
        options:
          - { label: 一般內容, value: normal }
          - { label: 卡片網格（亂數）, value: random-cards }
          - { label: 文字列表（亂數）, value: random-list }
        default: normal
      - label: 亂數顯示數量
        name: randomCount
        widget: number
        default: 5
        required: false
        hint: "只有亂數類型才需要填，例如從20個項目中隨機顯示5個"
      - { label: 內容, name: body, widget: markdown }