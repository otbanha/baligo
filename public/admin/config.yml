backend:
  name: github
  repo: otbanha/baligo
  branch: main
  base_url: https://baligo-auth.otbanha.workers.dev

media_library:
  name: r2

media_folder: ""
public_folder: ""

collections:
  - name: blog
    label: 文章
    folder: src/content/blog
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{hour}}{{minute}}{{second}}"
    sort_field: pubDate
    sort_direction: Descending
    sortable_fields:
      - pubDate
      - title
    summary: "{{title}}\n/blog/{{slug}}/"
    thumbnail_field: heroImage
    fields:
      - { label: 標題, name: title, widget: string }
      - { label: 描述, name: description, widget: text, required: false }
      - label: 發佈日期
        name: pubDate
        widget: datetime
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"
      - label: 分類
        name: category
        widget: select
        multiple: true
        required: false
        options:
          - 新手指南
          - 住宿推薦
          - 峇里島分區攻略
          - 簽證通關
          - 叫車包車
          - 家庭親子
          - 遊記分享
          - 美食景點活動
          - 旅行技巧
          - 新聞存檔
      - label: Tags
        name: tags
        widget: list
        required: false
        hint: "多個 tag 用「, 」隔開，例如：峇里島, 住宿, 推薦"
      - { label: 首圖, name: heroImage, widget: image, required: false, hint: "不填則自動抓取內文第一張圖" }
      - { label: 原始網址, name: originalUrl, widget: string, required: false }
      - { label: 內文, name: body, widget: markdown }
      - label: 影片嵌入
        name: embeds
        widget: list
        required: false
        summary: "{{fields.position}} - {{fields.url}}"
        fields:
          - { label: 插入位置標記, name: position, widget: string, hint: "在內文中輸入 <<video1>> <<video2>> 等標記" }
          - label: 平台
            name: platform
            widget: select
            options:
              - { label: YouTube, value: youtube }
              - { label: Instagram, value: instagram }
              - { label: TikTok, value: tiktok }
          - { label: 影片網址, name: url, widget: string }

  - name: promotions
    label: 促銷活動
    folder: src/content/promotions
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sort_field: expiresAt
    sort_direction: Ascending
    summary: "{{title}} — 截止：{{expiresAt}}"
    fields:
      - { label: 標題（自動抓取後可修改）, name: title, widget: string }
      - { label: 連結網址, name: url, widget: string }
      - { label: 封面圖網址（自動抓取後可修改）, name: coverImage, widget: string, required: false }
      - { label: 備注（內部用）, name: note, widget: text, required: false }
      - { label: 截止日期, name: expiresAt, widget: datetime, required: false, hint: "不填表示長期有效" }

  - name: blocks
    label: 內容區塊
    folder: src/content/blocks
    create: true
    slug: "{{slug}}"
    fields:
      - { label: 區塊名稱, name: title, widget: string }
      - label: 區塊類型
        name: type
        widget: select
        options:
          - { label: 一般內容, value: normal }
          - { label: 卡片網格（亂數）, value: random-cards }
          - { label: 文字列表（亂數）, value: random-list }
        default: normal
      - label: 亂數顯示數量
        name: randomCount
        widget: number
        default: 5
        required: false
        hint: "只有亂數類型才需要填，例如從20個項目中隨機顯示5個"
      - { label: 內容, name: body, widget: markdown }
